<!DOCTYPE html>
<html lang="en">
<head>
<title>To-Do List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.task-item{
    padding:10px;
    border-bottom:1px solid #eee;
}

.card{
    border-radius:10px;
}
</style>

</head>

<body>

<div class="container mt-5">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">My To-Do List</h2>

<form method="POST">
{% csrf_token %}

<div class="input-group mb-3">
{{form.title}}
<button class="btn btn-primary">Add Task</button>
</div>

</form>

<hr>

{% for task in tasks %}

<div class="task-item d-flex justify-content-between align-items-center mb-2">

<div>

{% if task.complete %}
<span class="text-muted"><strike>{{task}}</strike></span>
{% else %}
<span>{{task}}</span>
{% endif %}

</div>

<div>

<a class="btn btn-sm btn-warning" href="{% url 'update_task' task.id %}">
Update
</a>

<a class="btn btn-sm btn-danger" href="{% url 'delete_task' task.id %}">
Delete
</a>

</div>

</div>

{% empty %}

<p class="text-center text-muted">No tasks yet. Add one above.</p>

{% endfor %}

</div>

</div>

</body>
</html>
